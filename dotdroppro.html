<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6, maximum-scale=0.6, user-scalable=no">
    <title>DotDrop</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
        /* ===== 全局重置 ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.app {
    max-width: 640px;
    width: 100%;
    background: rgba(22, 27, 34, 0.9);
    backdrop-filter: blur(12px);
    border-radius: 28px;
    border: 1px solid rgba(48, 54, 61, 0.6);
    padding: 32px 28px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    transition: all 0.3s ease;
}

/* ===== 头部 ===== */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.5px;
}

.logo .dot {
    width: 18px;
    height: 18px;
    background: #58a6ff;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(88, 166, 255, 0.6);
    flex-shrink: 0;
}

.logo span {
    background: linear-gradient(135deg, #58a6ff, #a371f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.badge {
    font-size: 11px;
    background: rgba(88, 166, 255, 0.12);
    color: #58a6ff;
    padding: 4px 14px;
    border-radius: 30px;
    border: 1px solid rgba(88, 166, 255, 0.15);
    font-weight: 500;
    letter-spacing: 0.3px;
    white-space: nowrap;
}

/* ===== 房间控制区 ===== */
.room-input {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    align-items: center;
}

.room-input input {
    flex: 1 1 160px;
    padding: 12px 16px;
    border-radius: 14px;
    border: 1px solid #30363d;
    background: rgba(255, 255, 255, 0.04);
    color: #e6edf3;
    font-size: 18px;
    text-align: center;
    letter-spacing: 3px;
    outline: none;
    transition: 0.25s;
    font-weight: 600;
    min-width: 120px;
}

.room-input input:focus {
    border-color: #58a6ff;
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
}

.room-input .btn {
    flex: 0 1 auto;
}

/* ===== 通用按钮 ===== */
.btn {
    padding: 11px 24px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 15px;
    border: none;
    cursor: pointer;
    transition: 0.25s ease;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    white-space: nowrap;
    background: #58a6ff;
    color: #0d1117;
}

.btn:hover:not(:disabled) {
    background: #79c0ff;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(88, 166, 255, 0.35);
}

.btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.08);
    color: #e6edf3;
}

.btn-secondary:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.16);
}

.btn-success {
    background: #3fb950;
    color: #0d1117;
}

.btn-success:hover:not(:disabled) {
    background: #4fcf5e;
    box-shadow: 0 8px 24px rgba(63, 185, 80, 0.35);
}

.btn-danger {
    background: #f85149;
    color: #0d1117;
}

.btn-danger:hover:not(:disabled) {
    background: #ff6b63;
}

/* ===== 发送端区域 ===== */
#senderArea {
    display: block;
}

/* ----- 拖拽区（文件选择） ----- */
.drop-zone {
    position: relative;
    border: 2px dashed #30363d;
    border-radius: 18px;
    padding: 36px 20px;
    text-align: center;
    background: rgba(255, 255, 255, 0.02);
    transition: 0.3s;
    margin: 8px 0 16px 0;
    cursor: default;
}

.drop-zone:hover {
    border-color: #58a6ff;
    background: rgba(88, 166, 255, 0.04);
}

.drop-zone.dragover {
    border-color: #58a6ff;
    background: rgba(88, 166, 255, 0.08);
    box-shadow: inset 0 0 0 2px #58a6ff;
}

.drop-zone .icon {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
}

.drop-zone .title {
    font-size: 18px;
    font-weight: 600;
}

.drop-zone .sub {
    font-size: 14px;
    color: #8b949e;
    margin-top: 2px;
}

/* 隐藏的文件输入框 —— 仅覆盖拖拽区，不影响外部按钮 */
.drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    z-index: 2;
}

/* ----- 文件信息 ----- */
.file-info {
    display: none;
    align-items: center;
    gap: 14px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 14px;
    padding: 10px 18px;
    border: 1px solid #30363d;
    margin: 12px 0 18px 0;
}

.file-info.show {
    display: flex;
}

.file-info .name {
    flex: 1;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 14px;
}

.file-info .size {
    color: #8b949e;
    font-size: 13px;
    flex-shrink: 0;
}

.file-info .remove {
    background: none;
    border: none;
    color: #8b949e;
    cursor: pointer;
    font-size: 20px;
    transition: 0.2s;
    padding: 0 4px;
    line-height: 1;
}

.file-info .remove:hover {
    color: #f85149;
}

/* 发送按钮容器 */
#btnSend {
    width: 100%;
    margin-top: 4px;
}

/* ===== 接收端区域 ===== */
#receiverArea {
    display: none;
    margin-top: 16px;
    padding-top: 20px;
    border-top: 1px solid #30363d;
}

#receiverArea.show {
    display: block;
}

/* ===== 状态消息 ===== */
.status {
    margin-top: 16px;
    padding: 12px 18px;
    border-radius: 14px;
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 14px;
}

.status.show {
    display: flex;
}

.status.info {
    background: rgba(88, 166, 255, 0.10);
    color: #58a6ff;
    border: 1px solid rgba(88, 166, 255, 0.15);
}

.status.success {
    background: rgba(63, 185, 80, 0.10);
    color: #3fb950;
    border: 1px solid rgba(63, 185, 80, 0.15);
}

.status.error {
    background: rgba(248, 81, 73, 0.10);
    color: #f85149;
    border: 1px solid rgba(248, 81, 73, 0.15);
}

/* ===== 进度条 ===== */
.progress-wrap {
    display: none;
    margin-top: 16px;
}

.progress-wrap.show {
    display: block;
}

.progress-bar {
    height: 6px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 6px;
}

.progress-bar .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #58a6ff, #a371f7);
    border-radius: 10px;
    transition: width 0.3s ease;
}

.progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #8b949e;
}

/* ===== 下载区域 ===== */
.download-area {
    display: none;
    margin-top: 20px;
    padding: 18px 20px;
    background: rgba(63, 185, 80, 0.06);
    border-radius: 16px;
    border: 1px solid rgba(63, 185, 80, 0.15);
    text-align: center;
}

.download-area.show {
    display: block;
}

.download-area .file-name {
    font-weight: 600;
    font-size: 17px;
    margin-bottom: 2px;
}

.download-area .file-size {
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 14px;
}

/* ===== Footer ===== */
.footer {
    margin-top: 28px;
    text-align: center;
    font-size: 12px;
    color: #8b949e;
    border-top: 1px solid #30363d;
    padding-top: 18px;
    letter-spacing: 0.2px;
}

.footer a {
    color: #58a6ff;
    text-decoration: none;
}

.footer a:hover {
    text-decoration: underline;
}

/* ===== 响应式 ===== */
@media (max-width: 520px) {
    .app {
        padding: 20px 16px;
    }
    .header {
        flex-wrap: wrap;
        gap: 8px;
    }
    .logo {
        font-size: 22px;
    }
    .room-input {
        flex-direction: column;
        align-items: stretch;
    }
    .room-input input {
        font-size: 16px;
        padding: 10px;
        letter-spacing: 2px;
    }
    .room-input .btn {
        width: 100%;
        justify-content: center;
    }
    .drop-zone {
        padding: 28px 14px;
    }
    .drop-zone .icon {
        font-size: 36px;
    }
    .file-info {
        flex-wrap: wrap;
        gap: 8px;
    }
    #btnSend {
        width: 100%;
    }
}

/* ===== 工具类 ===== */
.mt-8 {
    margin-top: 8px;
}
.mb-8 {
    margin-bottom: 8px;
}
.flex-1 {
    flex: 1;
}
.text-center {
    text-align: center;
}
.gap-6 {
    gap: 6px;
}
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo"><span class="dot"></span><span>DotDrop</span></div>
        <span class="badge">Pro</span>
    </div>

    <!-- 房间号输入 -->
    <div class="room-input">
        <input type="text" id="roomInput" placeholder="房间号" maxlength="8" value="drops" />
        <button class="btn" id="btnCreate">创建房间</button>
        <button class="btn btn-secondary" id="btnJoin">加入房间</button>
    </div>

    <!-- 发送端区域 -->
    <div id="senderArea">
        <div class="drop-zone" id="dropZone">
            <span class="icon">📄</span>
            <div class="title">选择或拖拽文件</div>
            <div class="sub">单个文件，大小不限</div>
            <input type="file" id="fileInput" />
        </div>
        <div class="file-info" id="fileInfo">
            <span class="name" id="fileName">文件名</span>
            <span class="size" id="fileSize">0 MB</span>
            <button class="remove" id="fileRemove">✕</button>
        </div>
        <button class="btn" id="btnSend" disabled style="width:100%;">📤 发送文件</button>
    </div>

    <!-- 接收端区域 -->
    <div id="receiverArea" style="display:none;">
        <div class="status show info" style="display:flex;"><span>📥 等待发送端传输…</span></div>
        <div class="progress-wrap" id="progressReceive">
            <div class="progress-info"><span id="progressLabelReceive">接收中…</span><span id="progressPercentReceive">0%</span></div>
            <div class="progress-bar"><div class="fill" id="progressFillReceive"></div></div>
        </div>
        <div class="download-area" id="downloadArea">
            <div class="file-name" id="downloadFileName">文件名称</div>
            <div class="file-size" id="downloadFileSize">0 MB</div>
            <button class="btn btn-success" id="btnDownload">💾 下载文件</button>
        </div>
        <div class="status" id="statusReceive"></div>
    </div>

    <div class="footer">
        Copyright 2026 DotDrop & MbilseLLC - <a href="#" onclick="location.reload();return false;">断开连接</a>
    </div>
</div>

<script>
 (function() {
    'use strict';

    // DOM refs
    const roomInput = document.getElementById('roomInput');
    const btnCreate = document.getElementById('btnCreate');
    const btnJoin = document.getElementById('btnJoin');
    const senderArea = document.getElementById('senderArea');
    const receiverArea = document.getElementById('receiverArea');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const fileRemove = document.getElementById('fileRemove');
    const btnSend = document.getElementById('btnSend');
    const progressReceive = document.getElementById('progressReceive');
    const progressLabelReceive = document.getElementById('progressLabelReceive');
    const progressPercentReceive = document.getElementById('progressPercentReceive');
    const progressFillReceive = document.getElementById('progressFillReceive');
    const downloadArea = document.getElementById('downloadArea');
    const downloadFileName = document.getElementById('downloadFileName');
    const downloadFileSize = document.getElementById('downloadFileSize');
    const btnDownload = document.getElementById('btnDownload');
    const statusReceive = document.getElementById('statusReceive');

    // State
    let selectedFile = null;
    let peer = null;
    let conn = null;
    let isSender = false;
    let isConnected = false;
    let isTransferring = false;

    // 接收端变量（简化）
    let receivedChunks = [];
    let receivedFileName = '';
    let receivedFileSize = 0;
    let receivedTotalBytes = 0;
    let receiveComplete = false;

    const CHUNK_SIZE = 16 * 1024;

    // Helper
    function formatSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function showStatus(el, type, msg, icon) {
        el.className = 'status show ' + type;
        el.innerHTML = `<span>${icon||''}</span> ${msg}`;
    }
    function hideStatus(el) { el.className = 'status'; el.innerHTML = ''; }

    // Reset
    function resetAll() {
        if (conn) { conn.close(); conn = null; }
        if (peer) { peer.destroy(); peer = null; }
        isConnected = false;
        isTransferring = false;
        selectedFile = null;
        fileInfo.classList.remove('show');
        btnSend.disabled = true;
        progressReceive.classList.remove('show');
        downloadArea.classList.remove('show');
        hideStatus(statusReceive);
        receiverArea.style.display = 'none';
        senderArea.style.display = 'block';
        btnCreate.disabled = false;
        btnJoin.disabled = false;
        roomInput.disabled = false;
        // 重置接收端
        receivedChunks = [];
        receivedFileName = '';
        receivedFileSize = 0;
        receivedTotalBytes = 0;
        receiveComplete = false;
        fileInput.value = '';
        // 重置进度显示
        progressFillReceive.style.width = '0%';
        progressPercentReceive.textContent = '0%';
        progressLabelReceive.textContent = '';
    }

    // -------- 文件选择 --------
    function handleFileSelect(file) {
        if (!file) return;
        selectedFile = file;
        fileName.textContent = file.name;
        fileSize.textContent = formatSize(file.size);
        fileInfo.classList.add('show');
        btnSend.disabled = false;
    }

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            handleFileSelect(e.dataTransfer.files[0]);
            fileInput.files = e.dataTransfer.files;
        }
    });
    fileInput.addEventListener('change', function() {
        if (this.files.length > 0) handleFileSelect(this.files[0]);
        else { selectedFile = null; fileInfo.classList.remove('show'); btnSend.disabled = true; }
    });
    fileRemove.addEventListener('click', function() {
        selectedFile = null;
        fileInfo.classList.remove('show');
        btnSend.disabled = true;
        fileInput.value = '';
    });

    // -------- PeerJS 连接 --------
    function getRoomId() {
        let id = roomInput.value.trim();
        if (!id) id = 'D' + Math.floor(Math.random()*10000);
        return id;
    }

    // 发送端：创建房间
    btnCreate.addEventListener('click', function() {
        const room = getRoomId();
        if (!room) { alert('请输入房间号'); return; }
        resetAll();
        peer = new Peer(room, {
            debug: 2,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });
        peer.on('open', id => {
            isSender = true;
            btnCreate.disabled = true;
            btnJoin.disabled = true;
            roomInput.disabled = true;
            showStatus(statusReceive, 'info', `✅ 房间创建成功，等待接收端加入…`, '🔄');
            receiverArea.style.display = 'block';
            senderArea.style.display = 'block';
            peer.on('connection', incoming => {
                conn = incoming;
                setupConnection(conn, true);
            });
            peer.on('error', err => {
                console.error(err);
                showStatus(statusReceive, 'error', '❌ 错误: ' + err.message, '⚠️');
            });
        });
        peer.on('error', err => {
            console.error(err);
            showStatus(statusReceive, 'error', '❌ 创建房间失败: ' + err.message, '⚠️');
            btnCreate.disabled = false;
            btnJoin.disabled = false;
            roomInput.disabled = false;
        });
    });

    // 接收端：加入房间
    btnJoin.addEventListener('click', function() {
        const room = getRoomId();
        if (!room) { alert('请输入房间号'); return; }
        resetAll();
        peer = new Peer({
            debug: 2,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });
        peer.on('open', id => {
            isSender = false;
            btnCreate.disabled = true;
            btnJoin.disabled = true;
            roomInput.disabled = true;
            showStatus(statusReceive, 'info', `⏳ 正在连接房间 ${room}…`, '🔄');
            receiverArea.style.display = 'block';
            senderArea.style.display = 'none';
            conn = peer.connect(room);
            setupConnection(conn, false);
        });
        peer.on('error', err => {
            console.error(err);
            showStatus(statusReceive, 'error', '❌ 加入房间失败: ' + err.message, '⚠️');
            btnCreate.disabled = false;
            btnJoin.disabled = false;
            roomInput.disabled = false;
        });
    });

    // 设置 DataConnection
    function setupConnection(connObj, isSenderRole) {
        connObj.on('open', () => {
            isConnected = true;
            if (isSenderRole) {
                showStatus(statusReceive, 'success', '✅ 接收端已连接！可发送文件', '🚀');
                btnSend.disabled = false;
            } else {
                showStatus(statusReceive, 'info', '📥 已连接，等待文件…', '📡');
            }
        });
        connObj.on('data', data => {
            if (isSenderRole) {
                // 发送端忽略收到的任何数据（可扩展为确认）
            } else {
                handleReceiveData(data);
            }
        });
        connObj.on('close', () => {
            isConnected = false;
            showStatus(statusReceive, 'error', '❌ 连接已断开', '⚠️');
            btnSend.disabled = true;
        });
        connObj.on('error', err => {
            console.error(err);
            showStatus(statusReceive, 'error', '❌ 连接错误: ' + err.message, '⚠️');
        });
    }

    // -------- 发送文件 --------
    btnSend.addEventListener('click', function() {
        if (!selectedFile || !conn || !isConnected) {
            showStatus(statusReceive, 'error', '❌ 请先选择文件并等待连接', '⚠️');
            return;
        }
        if (isTransferring) return;
        isTransferring = true;
        this.disabled = true;

        const file = selectedFile;
        const fileSizeVal = file.size;
        const fileNameVal = file.name;
        const total = Math.ceil(fileSizeVal / CHUNK_SIZE);
        const header = JSON.stringify({ name: fileNameVal, size: fileSizeVal, chunks: total });
        conn.send(header);

        // 显示进度（在接收端显示）
        progressReceive.classList.add('show');
        progressFillReceive.style.width = '0%';
        progressPercentReceive.textContent = '0%';
        progressLabelReceive.textContent = `📤 发送 ${fileNameVal}`;
        showStatus(statusReceive, 'info', `📤 正在发送 ${fileNameVal}…`, '📤');

        let offset = 0;
        const reader = new FileReader();

        function readNext() {
            if (offset >= fileSizeVal) {
                isTransferring = false;
                btnSend.disabled = false;
                progressLabelReceive.textContent = '✅ 发送完成！';
                showStatus(statusReceive, 'success', '✅ 文件已发送！', '🎉');
                conn.send('__EOF__');
                return;
            }
            const slice = file.slice(offset, offset + CHUNK_SIZE);
            reader.readAsArrayBuffer(slice);
        }

        reader.onload = function(e) {
            const data = e.target.result;
            try {
                conn.send(data);
            } catch (err) {
                console.error(err);
                showStatus(statusReceive, 'error', '❌ 发送失败: ' + err.message, '⚠️');
                isTransferring = false;
                btnSend.disabled = false;
                return;
            }
            offset += data.byteLength;
            const percent = Math.min(100, Math.round((offset / fileSizeVal) * 100));
            progressFillReceive.style.width = percent + '%';
            progressPercentReceive.textContent = percent + '%';
            progressLabelReceive.textContent = `📤 发送中 ${formatSize(offset)} / ${formatSize(fileSizeVal)}`;
            setTimeout(readNext, 0);
        };

        reader.onerror = function(err) {
            console.error(err);
            showStatus(statusReceive, 'error', '❌ 读取文件失败', '⚠️');
            isTransferring = false;
            btnSend.disabled = false;
        };

        readNext();
    });

    // ============================================================
    //  接收数据（修复版） —— 不再使用状态机，直接收集
    // ============================================================
    let headerReceived = false;   // 是否已解析文件头
    let fileHeader = null;       // 存储 { name, size }

    function handleReceiveData(data) {
        // ---- 处理文本数据 ----
        if (typeof data === 'string') {
            // 结束标记
            if (data === '__EOF__') {
                if (receivedChunks.length > 0) {
                    onReceiveComplete();
                } else {
                    showStatus(statusReceive, 'error', '❌ 收到结束信号但没有数据', '⚠️');
                }
                return;
            }

            // 尝试解析 JSON 头部
            try {
                const parsed = JSON.parse(data);
                if (parsed.name && typeof parsed.size === 'number') {
                    fileHeader = parsed;
                    receivedFileName = parsed.name;
                    receivedFileSize = parsed.size;
                    receivedTotalBytes = 0;
                    receivedChunks = [];
                    headerReceived = true;

                    // 显示进度
                    progressReceive.classList.add('show');
                    progressFillReceive.style.width = '0%';
                    progressPercentReceive.textContent = '0%';
                    progressLabelReceive.textContent = `📥 接收 ${receivedFileName}`;
                    showStatus(statusReceive, 'info', `📥 正在接收 ${receivedFileName} (${formatSize(receivedFileSize)})`, '📥');
                    return;
                }
            } catch (_) {
                // 不是 JSON，忽略
            }

            // 其他文本消息（调试用）
            console.log('收到文本:', data);
            return;
        }

        // ---- 处理二进制数据 ----
        if (!headerReceived) {
            // 如果还没有头部，尝试将这段数据作为文本解析（防御性）
            try {
                const dec = new TextDecoder();
                const text = dec.decode(data);
                const parsed = JSON.parse(text);
                if (parsed.name && typeof parsed.size === 'number') {
                    fileHeader = parsed;
                    receivedFileName = parsed.name;
                    receivedFileSize = parsed.size;
                    receivedTotalBytes = 0;
                    receivedChunks = [];
                    headerReceived = true;
                    progressReceive.classList.add('show');
                    progressFillReceive.style.width = '0%';
                    progressPercentReceive.textContent = '0%';
                    progressLabelReceive.textContent = `📥 接收 ${receivedFileName}`;
                    showStatus(statusReceive, 'info', `📥 正在接收 ${receivedFileName} (${formatSize(receivedFileSize)})`, '📥');
                    return;
                }
            } catch (_) {
                // 不是头部，忽略该数据（但正常情况不会发生）
            }
            console.warn('收到二进制数据但尚未解析头部，已忽略');
            return;
        }

        // 已有头部，直接存储分片
        receivedChunks.push(data);
        receivedTotalBytes += data.byteLength;

        // 更新进度
        const percent = Math.min(100, Math.round((receivedTotalBytes / receivedFileSize) * 100));
        progressFillReceive.style.width = percent + '%';
        progressPercentReceive.textContent = percent + '%';
        progressLabelReceive.textContent = `📥 接收中 ${formatSize(receivedTotalBytes)} / ${formatSize(receivedFileSize)}`;

        // 如果累计字节数达到或超过文件大小，可以提前合并（但等待 EOF 更安全）
        // 这里只是显示，实际合并由 EOF 触发
    }

    // ---- 合并并生成下载 ----
    function onReceiveComplete() {
        if (receivedChunks.length === 0) {
            showStatus(statusReceive, 'error', '❌ 没有接收到任何数据', '⚠️');
            return;
        }

        // 计算总大小
        const totalSize = receivedChunks.reduce((sum, chunk) => sum + chunk.byteLength, 0);
        if (totalSize === 0) {
            showStatus(statusReceive, 'error', '❌ 接收到的数据为空', '⚠️');
            return;
        }

        progressLabelReceive.textContent = '✅ 接收完成！合并文件中…';
        showStatus(statusReceive, 'success', '✅ 文件接收完成！', '🎉');

        // 合并所有分片
        const buffer = new Uint8Array(totalSize);
        let offset = 0;
        for (const chunk of receivedChunks) {
            buffer.set(new Uint8Array(chunk), offset);
            offset += chunk.byteLength;
        }

        // 保存到全局变量供下载
        window._receivedFileBuffer = buffer.buffer;
        window._receivedFileName = receivedFileName;
        window._receivedFileSize = receivedFileSize;

        // 显示下载区域
        downloadArea.classList.add('show');
        downloadFileName.textContent = receivedFileName;
        downloadFileSize.textContent = formatSize(receivedFileSize);

        // 重置接收状态（准备下一次）
        headerReceived = false;
        receivedChunks = [];
        receivedTotalBytes = 0;
    }

    // -------- 下载 --------
    btnDownload.addEventListener('click', function() {
        const buffer = window._receivedFileBuffer;
        if (!buffer) {
            showStatus(statusReceive, 'error', '❌ 没有可下载的文件', '⚠️');
            return;
        }
        try {
            const blob = new Blob([buffer], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = window._receivedFileName || 'downloaded-file';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 5000);
            showStatus(statusReceive, 'success', '✅ 文件已下载！', '📂');
        } catch (err) {
            console.error(err);
            showStatus(statusReceive, 'error', '❌ 下载失败: ' + err.message, '⚠️');
        }
    });

    // 重置页面
    window.addEventListener('beforeunload', () => { if (peer) peer.destroy(); });

    // 初始
    resetAll();
    receiverArea.style.display = 'none';
    roomInput.value = 'D' + Math.floor(Math.random()*1000).toString().padStart(3,'0');
})();
</script>
